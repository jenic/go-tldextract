documentation:
  - changed-files:
      - any-glob-to-any-file: '**/*.md'

dependencies:
  - changed-files:
      - any-glob-to-any-file: ['go.mod', 'go.sum']

ci:
  - changed-files:
      - any-glob-to-any-file: '.github/**'

tests:
  - changed-files:
      - any-glob-to-any-file: ['**/*_test.go', 'testdata/**']

release:
  - changed-files:
      - any-glob-to-any-file: '.github/workflows/**'
